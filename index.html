<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Live Sports</title>
    <style>
        /* Modern Reset and Theme Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Card styling */
        .stream-card {
            background: linear-gradient(145deg, #111827, #1f2937);
            border: 2px solid #374151;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }

        .stream-card:hover {
            border-color: #3b82f6;
        }

        /* Live Indicator Badge */
        .live-badge {
            background-color: #ef4444;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
        }

        /* Headings */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Visual Video Player Placeholder Box */
        .player-mockup {
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            position: relative;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            border: 2px dashed #4b5563;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .player-overlay-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Action Button styling */
        .stream-btn {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 16px 36px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .stream-btn:hover {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        .stream-btn:active {
            transform: scale(0.98);
        }

        /* Instructions Text */
        .click-notice {
            font-size: 0.95rem;
            color: #3b82f6;
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.85; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="stream-card">
        <div class="live-badge">
            <span class="live-dot"></span> LIVE BROADCAST
        </div>
        
        <!-- Required Headings -->
        <h1>WATCH WC HERE</h1>
        <p class="subtitle">Your portal for live football tracking. Activate the transmission below to unlock your player.</p>
        
        <!-- Player Placeholder Box -->
        <div class="player-mockup">
            <div class="player-overlay-content">
                <!-- Stream Trigger Button -->
                <button class="stream-btn" id="secureStreamLink">
                    📺 Click to Watch Live
                </button>
                <p class="click-notice">Please click on this link to load stream directly</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const launchBtn = document.getElementById('secureStreamLink');
            
            // Updated Target URL
            const streamUrl = "https://knatech.info/streams/mexico-vs-ecuador";

            launchBtn.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Launches the window wrapper so your underlying website stays open
                window.open(
                    streamUrl, 
                    "LiveStreamPlayer", 
                    "width=1024,height=620,scrollbars=yes,resizable=yes,status=no,location=no,toolbar=no,menubar=no"
                );
            });
        });
    </script>

</body>
</html>
